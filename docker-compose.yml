services:
  api:
    build:
      context: .
    container_name: go-todo-api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/go_todo?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: go-todo-postgres
    environment:
      POSTGRES_DB: go_todo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go_todo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
